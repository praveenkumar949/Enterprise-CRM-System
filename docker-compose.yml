services:
  # ----------------------------------------------------------------------------------
  # POSTGRESQL DATABASES FOR MICROSERVICES (Database-per-Service Pattern)
  # ----------------------------------------------------------------------------------
  auth-db:
    image: postgres:15-alpine
    container_name: auth-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auth_service_db
    ports:
      - "5432:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - crm-network

  customer-db:
    image: postgres:15-alpine
    container_name: customer-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: customer_service_db
    ports:
      - "5433:5432"
    volumes:
      - customer-db-data:/var/lib/postgresql/data
    networks:
      - crm-network

  ticket-db:
    image: postgres:15-alpine
    container_name: ticket-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ticket_service_db
    ports:
      - "5434:5432"
    volumes:
      - ticket-db-data:/var/lib/postgresql/data
    networks:
      - crm-network

  # ----------------------------------------------------------------------------------
  # MONGODB FOR LOGS & NOTIFICATIONS
  # ----------------------------------------------------------------------------------
  notification-db:
    image: mongo:6-jammy
    container_name: notification-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: notification_db
    ports:
      - "27017:27017"
    volumes:
      - notification-db-data:/data/db
    networks:
      - crm-network

  # ----------------------------------------------------------------------------------
  # EVENT BROKER: KAFKA & ZOOKEEPER
  # ----------------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - crm-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - crm-network

  # ----------------------------------------------------------------------------------
  # BACKEND MICROSERVICES
  # ----------------------------------------------------------------------------------
  discovery-server:
    build: ./Backend/discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    networks:
      - crm-network
    environment:
      - EUREKA_INSTANCE_HOSTNAME=discovery-server

  api-gateway:
    build: ./Backend/api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    networks:
      - crm-network
    depends_on:
      - discovery-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/

  auth-service:
    build: ./Backend/auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    networks:
      - crm-network
    depends_on:
      - auth-db
      - discovery-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://auth-db:5432/auth_service_db

  customer-service:
    build: ./Backend/customer-service
    container_name: customer-service
    ports:
      - "8082:8082"
    networks:
      - crm-network
    depends_on:
      - customer-db
      - discovery-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://customer-db:5432/customer_service_db

  ticket-service:
    build: ./Backend/ticket-service
    container_name: ticket-service
    ports:
      - "8083:8083"
    networks:
      - crm-network
    depends_on:
      - ticket-db
      - kafka
      - discovery-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://ticket-db:5432/ticket_service_db
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  notification-service:
    build: ./Backend/notification-service
    container_name: notification-service
    ports:
      - "8084:8084"
    networks:
      - crm-network
    depends_on:
      - notification-db
      - kafka
      - discovery-server
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_DATA_MONGODB_URI=mongodb://admin:password@notification-db:27017/notification_db?authSource=admin
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092

networks:
  crm-network:
    driver: bridge

volumes:
  auth-db-data:
  customer-db-data:
  ticket-db-data:
  notification-db-data:
