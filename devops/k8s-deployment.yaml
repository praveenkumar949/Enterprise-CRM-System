apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: crm-prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: myacr.azurecr.io/crm-gateway:latest
        ports:
        - containerPort: 8080
        env:
        - name: EUREKA_URL
          value: "http://discovery-server:8761/eureka"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: crm-prod
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: api-gateway
